<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smouldering Marginalia — Generative Art Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button { margin-bottom: 0; }

        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group { margin-bottom: 16px; }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }

        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: #061A12;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
            .canvas-area { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Smouldering Marginalia</h1>
            <div class="subtitle">Luminous dust and drifting calligraphic ductus, ambient behind a candlelit level — Bayt al-Hikma.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="21500" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Dust Motes</label>
                    <div class="slider-container">
                        <input type="range" id="dustCount" min="40" max="400" step="10" value="160" oninput="updateParam('dustCount', this.value)">
                        <span class="value-display" id="dustCount-value">160</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Calligraphy Fragments</label>
                    <div class="slider-container">
                        <input type="range" id="calligraphyCount" min="0" max="24" step="1" value="9" oninput="updateParam('calligraphyCount', this.value)">
                        <span class="value-display" id="calligraphyCount-value">9</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Fog Pools</label>
                    <div class="slider-container">
                        <input type="range" id="fogDensity" min="0" max="10" step="1" value="5" oninput="updateParam('fogDensity', this.value)">
                        <span class="value-display" id="fogDensity-value">5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="driftSpeed" min="0.05" max="1.5" step="0.05" value="0.35" oninput="updateParam('driftSpeed', this.value)">
                        <span class="value-display" id="driftSpeed-value">0.35</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Glow Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="glowIntensity" min="0.2" max="2.0" step="0.05" value="0.85" oninput="updateParam('glowIntensity', this.value)">
                        <span class="value-display" id="glowIntensity-value">0.85</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Ground (background)</label>
                    <div class="color-picker-container">
                        <input type="color" id="bgColor" value="#061A12" onchange="updateColor('bgColor', this.value)">
                        <span class="color-value" id="bgColor-value">#061A12</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Emerald (fog)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#055C3F" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#055C3F</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Gold (dust + ductus)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#D4AF37" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#D4AF37</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Parchment (dust + ductus)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#F8F4EC" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#F8F4EC</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // GENERATIVE ART PARAMETERS
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 21500,
            dustCount: 160,
            calligraphyCount: 9,
            fogDensity: 5,
            driftSpeed: 0.35,
            glowIntensity: 0.85,
            bgColor: '#061A12',
            colorPalette: ['#055C3F', '#D4AF37', '#F8F4EC']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // ═══════════════════════════════════════════════════════════════════════
        // P5.JS GENERATIVE ART ALGORITHM
        // ═══════════════════════════════════════════════════════════════════════

        let dustMotes = [];
        let fogPools = [];
        let glyphs = [];

        function setup() {
            let canvas = createCanvas(1200, 720);
            canvas.parent('canvas-container');
            pixelDensity(1);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            background(params.bgColor);

            dustMotes = [];
            for (let i = 0; i < params.dustCount; i++) dustMotes.push(new DustMote());

            fogPools = [];
            for (let i = 0; i < params.fogDensity; i++) fogPools.push(new FogPool());

            glyphs = [];
            for (let i = 0; i < params.calligraphyCount; i++) glyphs.push(new Glyph());
        }

        function draw() {
            noStroke();
            let bg = color(params.bgColor);
            bg.setAlpha(48);
            fill(bg);
            rect(0, 0, width, height);

            for (let f of fogPools) { f.update(); f.display(); }
            for (let g of glyphs) { g.update(); g.display(); }
            for (let d of dustMotes) { d.update(); d.display(); }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // FOG POOL — vast, soft, slow-drifting luminance fields
        // ═══════════════════════════════════════════════════════════════════════

        class FogPool {
            constructor() {
                this.x = random(width);
                this.y = random(height);
                this.r = random(200, 380);
                this.nOff = random(10000);
                this.warm = random() < 0.45;
            }
            update() {
                let t = frameCount * 0.0009 * params.driftSpeed;
                this.x += (noise(this.nOff, t) - 0.5) * 0.7;
                this.y += (noise(this.nOff + 999, t) - 0.5) * 0.35;
                let pad = this.r * 0.6;
                if (this.x < -pad) this.x = width + pad;
                if (this.x > width + pad) this.x = -pad;
                if (this.y < -pad) this.y = height + pad;
                if (this.y > height + pad) this.y = -pad;
            }
            display() {
                let base = this.warm ? color(params.colorPalette[1]) : color(params.colorPalette[0]);
                let ctx = drawingContext;
                let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
                let a = 0.05 * params.glowIntensity;
                grad.addColorStop(0, `rgba(${red(base)},${green(base)},${blue(base)},${a})`);
                grad.addColorStop(1, `rgba(${red(base)},${green(base)},${blue(base)},0)`);
                ctx.save();
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, TWO_PI);
                ctx.fill();
                ctx.restore();
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // DUST MOTE — slow noise-field drift, independent twinkle phase
        // ═══════════════════════════════════════════════════════════════════════

        class DustMote {
            constructor() {
                this.x = random(width);
                this.y = random(height);
                this.baseR = random(0.5, 1.5);
                this.phase = random(TWO_PI);
                this.twinkleSpeed = random(0.006, 0.020);
                this.nOff = random(10000);
                this.warm = random() < 0.6;
            }
            update() {
                let t = frameCount * 0.0022 * params.driftSpeed;
                let angle = noise(this.x * 0.0018, this.y * 0.0018, this.nOff + t) * TWO_PI * 2.4;
                let spd = 0.16 * params.driftSpeed;
                this.x += cos(angle) * spd;
                this.y += sin(angle) * spd - 0.045 * params.driftSpeed;
                if (this.x < -12) this.x = width + 12;
                if (this.x > width + 12) this.x = -12;
                if (this.y < -12) this.y = height + 12;
                if (this.y > height + 12) this.y = -12;
                this.phase += this.twinkleSpeed;
            }
            display() {
                let tw = sin(this.phase) * 0.5 + 0.5;
                let alpha = (0.12 + tw * 0.5) * params.glowIntensity;
                let c = color(this.warm ? params.colorPalette[1] : params.colorPalette[2]);
                let ctx = drawingContext;
                let r = this.baseR * (2.6 + tw * 2.6);
                let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r);
                grad.addColorStop(0, `rgba(${red(c)},${green(c)},${blue(c)},${alpha})`);
                grad.addColorStop(1, `rgba(${red(c)},${green(c)},${blue(c)},0)`);
                ctx.save();
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.x, this.y, r, 0, TWO_PI);
                ctx.fill();
                ctx.restore();

                noStroke();
                fill(red(c), green(c), blue(c), 235 * alpha);
                circle(this.x, this.y, this.baseR * (0.6 + tw * 0.7));
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // GLYPH — abstract calligraphic ductus: tapered spine + flourishes + dots
        // not literal script, only its gesture. Fades in, drifts up, fades out.
        // ═══════════════════════════════════════════════════════════════════════

        class Glyph {
            constructor() { this.respawn(); }

            respawn() {
                this.x = random(width * 0.10, width * 0.90);
                this.y = random(height * 0.20, height * 0.95);
                this.scale = random(38, 76);
                this.rot = random(-0.30, 0.30);
                this.life = 0;
                this.lifespan = floor(random(420, 780));
                this.driftX = random(-0.05, 0.09);
                this.driftY = -random(0.05, 0.13);
                this.swayOff = random(10000);
                this.warm = random() < 0.7;

                this.baseline = [];
                let n = floor(random(3, 5));
                let by = random(-0.15, 0.15);
                for (let i = 0; i < n; i++) {
                    by = constrain(by + random(-0.35, 0.35), -0.6, 0.6);
                    this.baseline.push({ x: -1 + (i + 1) * (2 / n), y: by });
                }

                this.flourishes = [];
                let nf = floor(random(1, 4));
                for (let i = 0; i < nf; i++) {
                    let up = random() < 0.6;
                    this.flourishes.push({
                        t: random(0.15, 0.85),
                        len: random(0.25, 0.55) * (up ? -1 : 1),
                        curve: random(-0.3, 0.3)
                    });
                }

                this.dots = [];
                let nd = floor(random(0, 3));
                for (let i = 0; i < nd; i++) {
                    this.dots.push({ t: random(0.1, 0.9), side: random() < 0.5 ? -1 : 1, off: random(0.18, 0.32) });
                }
            }

            update() {
                this.life++;
                let sway = (noise(this.swayOff, frameCount * 0.0018) - 0.5) * 0.5;
                this.x += (this.driftX + sway) * params.driftSpeed;
                this.y += this.driftY * params.driftSpeed;
                if (this.life > this.lifespan) this.respawn();
            }

            envelope() {
                let p = constrain(this.life / this.lifespan, 0, 1);
                return sin(p * PI);
            }

            sampleBaseline(t) {
                let pts = [{ x: -1, y: 0 }, ...this.baseline];
                let segT = t * (pts.length - 1);
                let i = constrain(floor(segT), 0, pts.length - 2);
                let lt = segT - i;
                let a = pts[i], b = pts[i + 1];
                return { x: lerp(a.x, b.x, lt), y: lerp(a.y, b.y, lt) };
            }

            toScreen(nx, ny) {
                let rx = nx * cos(this.rot) - ny * sin(this.rot);
                let ry = nx * sin(this.rot) + ny * cos(this.rot);
                return { x: this.x + rx * this.scale, y: this.y + ry * this.scale };
            }

            display() {
                let env = this.envelope();
                if (env <= 0.01) return;
                let alpha = env * 150 * params.glowIntensity;
                let c = color(this.warm ? params.colorPalette[1] : params.colorPalette[2]);
                stroke(red(c), green(c), blue(c), alpha);
                noFill();

                let samples = 22;
                for (let i = 0; i < samples; i++) {
                    let t0 = i / samples, t1 = (i + 1) / samples;
                    let p0 = this.sampleBaseline(t0), p1 = this.sampleBaseline(t1);
                    let mid = abs((t0 + t1) / 2 - 0.5) * 2;
                    let w = lerp(3.0, 0.5, mid) * (this.scale / 50);
                    strokeWeight(max(0.4, w));
                    let s0 = this.toScreen(p0.x, p0.y), s1 = this.toScreen(p1.x, p1.y);
                    line(s0.x, s0.y, s1.x, s1.y);
                }

                for (let fl of this.flourishes) {
                    let base = this.sampleBaseline(fl.t);
                    let steps = 9;
                    let prev = this.toScreen(base.x, base.y);
                    for (let i = 1; i <= steps; i++) {
                        let tt = i / steps;
                        let nx = base.x + fl.curve * tt;
                        let ny = base.y + fl.len * tt;
                        let w = lerp(2.2, 0.35, tt) * (this.scale / 50);
                        strokeWeight(max(0.3, w));
                        let cur = this.toScreen(nx, ny);
                        line(prev.x, prev.y, cur.x, cur.y);
                        prev = cur;
                    }
                }

                noStroke();
                fill(red(c), green(c), blue(c), alpha * 1.15);
                for (let d of this.dots) {
                    let base = this.sampleBaseline(d.t);
                    let p = this.toScreen(base.x, base.y + d.side * d.off);
                    circle(p.x, p.y, max(1.3, this.scale * 0.045));
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI CONTROL HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        const STRUCTURAL_PARAMS = ['dustCount', 'calligraphyCount', 'fogDensity'];

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;
            if (STRUCTURAL_PARAMS.includes(paramName)) {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            document.getElementById(colorId + '-value').textContent = value;
            if (colorId === 'bgColor') {
                params.bgColor = value;
            } else if (colorId === 'color1') {
                params.colorPalette[0] = value;
            } else if (colorId === 'color2') {
                params.colorPalette[1] = value;
            } else if (colorId === 'color3') {
                params.colorPalette[2] = value;
            }
            background(params.bgColor);
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('dustCount').value = params.dustCount;
            document.getElementById('dustCount-value').textContent = params.dustCount;
